<!DOCTYPE html>

    <style>
        :root {
            --bg-color: #F8F6F2;
            --text-main: #1A1A1A;
            --text-sub: #666666;
            --brand-red: #E63946;
            --card-bg: #FFFFFF;
            --shadow-sm: 0 2px 8px rgba(0,0,0,0.08);
            --shadow-md: 0 4px 16px rgba(0,0,0,0.12);
            --radius: 12px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        img { width: 100%; height: auto; display: block; }
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background: var(--bg-color);
            color: var(--text-main);
            overflow-x: hidden;
        }
        a { text-decoration: none; color: inherit; }

        header {
            position: fixed;
            top: 0; left: 0;
            width: 100%;
            padding: 15px 20px;
            z-index: 1000;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(248,246,242,0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }
        .nav-logo { height: 32px; width: auto; }
        .nav-links { display: flex; align-items: center; }
        .nav-links a {
            margin-left: 16px;
            font-size: 0.7rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            font-weight: 300;
            color: var(--text-sub);
            white-space: nowrap;
        }
        .nav-links a.pdf-link {
            background: var(--brand-red);
            color: #fff;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.65rem;
        }

        .hamburger {
            display: flex;
            flex-direction: column;
            gap: 5px;
            cursor: pointer;
            z-index: 1100;
            padding: 5px;
        }
        .hamburger span {
            width: 25px;
            height: 2px;
            background: var(--text-main);
            border-radius: 2px;
        }
        .hamburger.active span:nth-child(1) { transform: rotate(45deg) translate(5px, 5px); }
        .hamburger.active span:nth-child(2) { opacity: 0; }
        .hamburger.active span:nth-child(3) { transform: rotate(-45deg) translate(5px, -5px); }

        .mobile-nav-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(248,246,242,0.98);
            z-index: 1050;
            display: flex;
            flex-direction: column;
            transform: translateY(-100%);
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .mobile-nav-overlay.open { transform: translateY(0); }
        .mobile-nav-header { padding: 60px 20px 20px; flex: 1; }
        .mobile-nav-close {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 30px;
        }
        .mobile-nav-back {
            padding: 10px 20px;
            border: 1px solid var(--text-main);
            border-radius: 25px;
            font-size: 0.85rem;
        }
        .mobile-nav-close-btn {
            font-size: 1.5rem;
            cursor: pointer;
            padding: 10px;
            border: none;
            background: none;
        }
        .mobile-nav-title {
            font-size: 0.7rem;
            letter-spacing: 3px;
            color: var(--text-sub);
            margin-bottom: 15px;
            text-transform: uppercase;
        }
        .mobile-nav-links { display: flex; flex-direction: column; }
        .mobile-nav-links a {
            display: block;
            font-size: 1.1rem;
            padding: 16px 0;
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
        }

        /* 產品主圖 */

            width: 100%;
            height: auto;
            display: block;
        }

            padding: 24px 20px;
        }
        .product-breadcrumb {
            font-size: 0.7rem;
            color: var(--text-sub);
            letter-spacing: 1px;
            margin-bottom: 16px;
        }
        .product-breadcrumb a {
            color: var(--brand-red);
        }
        .product-title {
            font-size: 1.5rem;
            font-weight: 400;
            margin-bottom: 8px;
            letter-spacing: 2px;
        }
        .product-cat {
            font-size: 0.7rem;
            color: var(--text-sub);
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 16px;
        }
        .product-desc {
            font-size: 0.9rem;
            color: var(--text-sub);
            line-height: 1.8;
            margin-bottom: 20px;
        }
        .product-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 24px;
        }
        .product-tag {
            display: inline-block;
            padding: 6px 14px;
            background: #f0f0f0;
            border-radius: 20px;
            font-size: 0.7rem;
            color: var(--text-sub);
            letter-spacing: 1px;
        }

        /* 多圖展示區 */
        .gallery-section {

            font-weight: 400;
            letter-spacing: 1px;
            margin-bottom: 16px;
            padding-top: 10px;
        }
        .gallery-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
        }
        .gallery-item {
            border-radius: var(--radius);
            overflow: hidden;
            box-shadow: var(--shadow-sm);
            background: var(--card-bg);
        }
        .gallery-item img {
            width: 100%;
            height: auto;
            display: block;
        }
        .gallery-label {
            padding: 10px 14px;
            font-size: 0.75rem;
            color: var(--text-sub);
            letter-spacing: 1px;
        }

        /* 回到產品目錄 */

            text-align: center;
            padding: 16px 20px;
            border-top: 1px solid #E0E0E0;

            font-size: 0.85rem;
            letter-spacing: 1px;
            color: var(--text-main);
        }

        .footer-bar {
            padding: 30px 20px;
            border-top: 1px solid #E0E0E0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--card-bg);
        }
        .footer-bar img:first-child {

        .footer-icons { display: flex; gap: 12px; align-items: center; }

        .designer-box {

            color: #999;

            line-height: 1.8;
        }
        .designer-box a { color: #fff; }
