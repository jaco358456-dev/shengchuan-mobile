<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        :root {
            --bg-primary: #F8F6F2;
            --bg-card: #FFFFFF;
            --text-primary: #1A1A1A;
            --text-secondary: #666666;
            --brand-red: #E63946;
            --border-subtle: rgba(0,0,0,0.06);
            --shadow-sm: 0 2px 8px rgba(0,0,0,0.06);
            --shadow-md: 0 4px 16px rgba(0,0,0,0.08);
            --radius: 12px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        img { width: 100%; height: auto; display: block; }
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            overflow-x: hidden;
            padding-top: 50px;
            padding-bottom: 80px;
        }
        a { text-decoration: none; color: inherit; }

        /* 頂部導覽列 */
        .mobile-header {
            position: fixed; top: 0; left: 0; right: 0;
            height: 50px;
            background: rgba(248,246,242,0.95);
            backdrop-filter: blur(20px);
            display: flex; justify-content: space-between;
            align-items: center;
            padding: 0 12px;
            z-index: 1000;
            border-bottom: 1px solid var(--border-subtle);
        }
        .header-logo { height: 10px; width: auto; cursor: pointer; }
        .hamburger {
            display: flex; flex-direction: column;
            gap: 4px; cursor: pointer; padding: 5px;
        }
        .hamburger span {
            width: 22px; height: 2px;
            background: var(--text-primary); border-radius: 2px;
        }
        .hamburger.active span:nth-child(1) { transform: rotate(45deg) translate(5px, 5px); }
        .hamburger.active span:nth-child(2) { opacity: 0; }
        .hamburger.active span:nth-child(3) { transform: rotate(-45deg) translate(6px, -6px); }
        .header-contact {
            font-size: 0.65rem; letter-spacing: 1px;
            color: var(--brand-red); font-weight: 500;
            padding: 6px 12px; border: 1px solid var(--brand-red);
            border-radius: 20px;
        }

        /* 漢堡選單 */
        .nav-overlay {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            background: var(--bg-primary);
            z-index: 999;
            display: flex; flex-direction: column;
            transform: translateY(-100%);
            transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .nav-overlay.open { transform: translateY(0); }
        .nav-overlay-content { padding: 70px 24px 40px; flex: 1; }
        .nav-overlay-title {
            font-size: 0.65rem; letter-spacing: 3px;
            color: var(--text-secondary);
            margin-bottom: 24px; text-transform: uppercase;
        }
        .nav-overlay-links { display: flex; flex-direction: column; }
        .nav-overlay-links a {
            display: block; font-size: 1.1rem;
            padding: 16px 0;
            border-bottom: 1px solid var(--border-subtle);
            opacity: 0; transform: translateY(-10px);
            transition: opacity 0.3s ease, transform 0.3s ease;
        }
        .nav-overlay.open .nav-overlay-links a {
            opacity: 1; transform: translateY(0);
        }
        .nav-overlay-links a:nth-child(1) { transition-delay: 0.1s; }
        .nav-overlay-links a:nth-child(2) { transition-delay: 0.15s; }
        .nav-overlay-links a:nth-child(3) { transition-delay: 0.2s; }
        .nav-overlay-links a:nth-child(4) { transition-delay: 0.25s; }
        .nav-overlay-links a:nth-child(5) { transition-delay: 0.3s; }

        /* 頁面標題 */
        .page-header {
            padding: 24px 20px;
        }
        .page-label {
            font-size: 0.6rem; letter-spacing: 3px;
            color: var(--text-secondary);
            margin-bottom: 8px; text-transform: uppercase;
        }
        .page-title {
            font-size: clamp(1.4rem, 4.5vw, 2rem);
            font-weight: 300; margin-bottom: 12px;
        }
        .page-desc {
            font-size: 0.8rem; color: var(--text-secondary);
            line-height: 1.6;
        }

        /* 分類篩選 */
        .filter-bar {
            padding: 0 20px 20px;
        }
        .filter-tabs {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
            padding-bottom: 4px;
        }
        .filter-tabs::-webkit-scrollbar { display: none; }
        .filter-tab {
            flex-shrink: 0;
            padding: 8px 16px;
            font-size: 0.75rem;
            border-radius: 20px;
            border: 1px solid var(--border-subtle);
            color: var(--text-secondary);
            transition: all 0.2s;
            cursor: pointer;
        }
        .filter-tab.active,
        .filter-tab:active {
            background: var(--brand-red);
            color: #fff;
            border-color: var(--brand-red);
        }

        /* 產品列表 */
        .product-list { padding: 0 20px; }
        .product-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }
        .product-card {
            background: var(--bg-card);
            border-radius: var(--radius);
            overflow: hidden;
            box-shadow: var(--shadow-sm);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .product-card:active {
            transform: scale(0.97);
            box-shadow: none;
        }
        .product-card-thumb {
            width: 100%;
            aspect-ratio: 4/3;
            object-fit: cover;
            background: #eee;
        }
        .product-card-body {
            padding: 12px;
        }
        .product-card-name {
            font-size: 0.85rem;
            font-weight: 500;
            margin-bottom: 4px;
        }
        .product-card-cat {
            font-size: 0.65rem;
            color: var(--brand-red);
            letter-spacing: 1px;
            margin-bottom: 6px;
        }
        .product-card-desc {
            font-size: 0.7rem;
            color: var(--text-secondary);
            line-height: 1.5;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        /* 頁尾 */
        .footer-bar {
            padding: 24px 20px;
            border-top: 1px solid var(--border-subtle);
            display: flex; justify-content: space-between;
            align-items: center; background: var(--bg-card);
        }
        .footer-logo { height: 24px; width: auto; opacity: 0.4; }
        .footer-icons { display: flex; gap: 12px; align-items: center; }
        .footer-icons img { height: 24px; width: auto; opacity: 0.6; }
        .designer-box {
            padding: 24px 20px;
            background: #1A1A1A; color: #999;
            text-align: center; font-size: 0.75rem; line-height: 1.8;
        }
        .designer-box a { color: #fff; text-decoration: underline; }

        /* 底部固定導航 */
        .bottom-nav {
            position: fixed; bottom: 0; left: 0; right: 0;
            height: 70px;
            background: rgba(248,246,242,0.95);
            backdrop-filter: blur(20px);
            display: flex; justify-content: space-around;
            align-items: center;
            padding-bottom: env(safe-area-inset-bottom);
            z-index: 1000;
            border-top: 1px solid var(--border-subtle);
        }
        .nav-tab {
            display: flex; flex-direction: column;
            align-items: center; gap: 4px;
            font-size: 0.6rem; color: var(--text-secondary);
            padding: 6px 4px; transition: color 0.2s;
        }
        .nav-tab.active { color: var(--brand-red); }
        .nav-tab.active svg { stroke-width: 2; }
        .nav-tab svg {
            width: 22px; height: 22px; stroke: currentColor;
            fill: none; stroke-width: 1.5;
            stroke-linecap: round; stroke-linejoin: round;
        }
    </style>
</head>

            { id:35, name:"款式 AI", cat:"stone", catName:"石材系列", desc:"精選石材款式", thumb:"35/product0871.jpg", path:"35" }
        ];

        var currentFilter = 'all';

        function renderProducts() {
            var grid = document.getElementById('productGrid');
            var filtered = currentFilter === 'all' ? products : products.filter(function(p) { return p.cat === currentFilter; });

            grid.innerHTML = '';
            filtered.forEach(function(p) {
                var card = document.createElement('a');
                card.href = p.path + '/index.html';
                card.className = 'product-card';
                card.innerHTML =
                    '<img src="' + p.thumb + '" class="product-card-thumb" alt="' + p.name + '">' +
                    '<div class="product-card-body">' +
                        '<div class="product-card-cat">' + p.catName + '</div>' +
                        '<div class="product-card-name">' + p.name + '</div>' +
                        '<div class="product-card-desc">' + p.desc + '</div>' +
                    '</div>';
                grid.appendChild(card);
            });
        }

        function filterProducts(cat) {
            currentFilter = cat;
            var tabs = document.querySelectorAll('.filter-tab');
            for (var i = 0; i < tabs.length; i++) {
                tabs[i].classList.remove('active');
            }
            event.target.classList.add('active');
            renderProducts();
        }

        renderProducts();
    </script>
