<!DOCTYPE html>
<html lang="zh-Hant">
<head>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {{ --bg-color:#F8F6F2; --text-main:#1A1A1A; --text-sub:#666666; --brand-red:#E63946; --card-bg:#FFFFFF; --shadow-sm:0 2px 8px rgba(0,0,0,0.08); --radius:12px; }}
        * {{ margin:0; padding:0; box-sizing:border-box; }}
        img {{ width:100%; height:auto; display:block; }}
        body {{ font-family:'Noto Sans TC',sans-serif; background:var(--bg-color); color:var(--text-main); overflow-x:hidden; }}
        a {{ text-decoration:none; color:inherit; }}
        header {{ position:fixed; top:0; left:0; width:100%; padding:15px 20px; z-index:1000; display:flex; justify-content:space-between; align-items:center; background:rgba(248,246,242,0.95); backdrop-filter:blur(10px); border-bottom:1px solid rgba(0,0,0,0.05); }}
        .nav-logo {{ height:32px; width:auto; }}
        .nav-links {{ display:flex; align-items:center; }}
        .nav-links a {{ margin-left:16px; font-size:0.7rem; letter-spacing:1px; text-transform:uppercase; font-weight:300; color:var(--text-sub); white-space:nowrap; }}
        .hamburger {{ display:flex; flex-direction:column; gap:5px; cursor:pointer; z-index:1100; padding:5px; }}
        .hamburger span {{ width:25px; height:2px; background:var(--text-main); border-radius:2px; }}
        .hamburger.active span:nth-child(1) {{ transform:rotate(45deg) translate(5px,5px); }}
        .hamburger.active span:nth-child(2) {{ opacity:0; }}
        .hamburger.active span:nth-child(3) {{ transform:rotate(-45deg) translate(5px,-5px); }}
        .mobile-nav-overlay {{ position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(248,246,242,0.98); z-index:1050; display:flex; flex-direction:column; transform:translateY(-100%); transition:transform 0.4s cubic-bezier(0.4,0,0.2,1); }}
        .mobile-nav-overlay.open {{ transform:translateY(0); }}
        .mobile-nav-header {{ padding:60px 20px 20px; flex:1; }}
        .mobile-nav-close {{ display:flex; align-items:center; justify-content:space-between; margin-bottom:30px; }}
        .mobile-nav-back {{ padding:10px 20px; border:1px solid var(--text-main); border-radius:25px; font-size:0.85rem; }}
        .mobile-nav-close-btn {{ font-size:1.5rem; cursor:pointer; padding:10px; border:none; background:none; }}
        .mobile-nav-title {{ font-size:0.7rem; letter-spacing:3px; color:var(--text-sub); margin-bottom:15px; text-transform:uppercase; }}
        .mobile-nav-links {{ display:flex; flex-direction:column; }}
        .mobile-nav-links a {{ display:block; font-size:1.1rem; padding:16px 0; border-bottom:1px solid rgba(0,0,0,0.05); }}
        .page-header {{ margin-top:65px; padding:20px; }}
        .page-header h1 {{ font-size:1.3rem; font-weight:400; }}
        .section-box {{ padding:20px; }}
        .product-img {{ width:100%; height:auto; background:var(--card-bg); border-radius:var(--radius); overflow:hidden; box-shadow:var(--shadow-sm); margin-bottom:20px; }}
        .product-img img {{ width:100%; height:auto; }}
        .product-info {{ background:var(--card-bg); border-radius:var(--radius); overflow:hidden; box-shadow:var(--shadow-sm); }}
        .product-info-body {{ padding:20px; }}
        .product-info h2 {{ font-size:1.1rem; font-weight:400; margin-bottom:8px; }}
        .product-info p {{ font-size:0.85rem; color:var(--text-sub); line-height:1.6; }}
        .back-btn {{ display:block; text-align:center; padding:12px 24px; border:1px solid var(--text-main); border-radius:25px; font-size:0.8rem; margin-bottom:16px; }}
        .footer-bar {{ padding:30px 20px; border-top:1px solid #E0E0E0; display:flex; justify-content:space-between; align-items:center; background:var(--card-bg); }}
        .footer-bar img:first-child {{ height:24px; width:auto; opacity:0.4; }}
        .footer-icons {{ display:flex; gap:12px; align-items:center; }}
        .footer-icons img {{ height:24px; width:auto; opacity:0.6; }}
        .designer-box {{ padding:24px 20px; background:#1A1A1A; color:#999; text-align:center; font-size:0.75rem; line-height:1.8; }}
        .designer-box a {{ color:#fff; }}
    </style>
</head>
<body>
